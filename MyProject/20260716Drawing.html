  <style>
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }
    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
      50% { opacity: 1; transform: scale(1) rotate(180deg); }
    }
    @keyframes cloud-drift {
      0% { transform: translateX(-8vw); opacity: 0.35; }
      50% { opacity: 0.65; }
      100% { transform: translateX(8vw); opacity: 0.35; }
    }
    @keyframes slot-spin {
      0% { transform: translateY(0); }
      100% { transform: translateY(-100%); }
    }
    @keyframes winner-reveal {
      0% { transform: scale(0) rotate(-10deg); opacity: 0; }
      50% { transform: scale(1.2) rotate(3deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes confetti-fall {
      0% { transform: translateY(-10%) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100%) rotate(720deg); opacity: 0; }
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
      50% { box-shadow: 0 0 60px rgba(255, 215, 0, 0.8), 0 0 100px rgba(255, 215, 0, 0.4); }
    }
    @keyframes name-cycle {
      0% { transform: translateY(0); }
      100% { transform: translateY(calc(-100% + 60px)); }
    }
    @keyframes fade-out {
      0% { opacity: 1; }
      100% { opacity: 0.3; }
    }
    .shimmer-text {
      background: linear-gradient(90deg, #ff2b2b, #ffd6d6, #d70000, #ffd6d6, #ff2b2b);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
    }
    .sparkle {
      position: absolute;
      width: 120px;
      height: 48px;
      border-radius: 9999px;
      background:
        radial-gradient(circle at 22% 58%, rgba(255,255,255,0.95) 0 26px, transparent 27px),
        radial-gradient(circle at 50% 38%, rgba(255,255,255,0.98) 0 30px, transparent 31px),
        radial-gradient(circle at 75% 58%, rgba(255,255,255,0.95) 0 24px, transparent 25px),

      filter: blur(0.2px);
      animation: cloud-drift 9s ease-in-out infinite alternate;
    }
    .confetti-piece {
      position: absolute;
      width: 10px;
      height: 20px;
      top: -5%;
      animation: confetti-fall linear forwards;
    }
    .winner-tag {
      animation: fade-out 0.5s ease-out forwards;
    }

  // Initialize audio context on user interaction
  function initAudioContext() {
    if (!audioContext) {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  // Play spinning beep sound
  function playSpinningBeep(frequency = 800) {
    if (!audioContext) initAudioContext();
    
    const now = audioContext.currentTime;
    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();
    
    osc.connect(gain);
    gain.connect(audioContext.destination);
    
    osc.frequency.value = frequency;
    gain.gain.setValueAtTime(0.3, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
    
    osc.start(now);
    osc.stop(now + 0.1);
  }

  // Play winning sound (ascending tone)
  function playWinningSound() {
    if (!audioContext) initAudioContext();
    
    const now = audioContext.currentTime;
    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();
    
    osc.connect(gain);
    gain.connect(audioContext.destination);
    
    osc.frequency.setValueAtTime(600, now);
    osc.frequency.exponentialRampToValueAtTime(1200, now + 0.4);
    
    gain.gain.setValueAtTime(0.4, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
    
    osc.start(now);
    osc.stop(now + 0.4);
  }

  // Play exciting tense music
  function playDramaticMusic(duration) {
    if (!audioContext) initAudioContext();
    
    const now = audioContext.currentTime;

    // Exciting string riff (ascending)
    const playExcitingStrings = () => {
      const notes = [
        { freq: 330, time: 0, duration: 0.3 },      // E4
        { freq: 392, time: 0.25, duration: 0.3 },   // G4
        { freq: 494, time: 0.5, duration: 0.3 },    // B4
        { freq: 587, time: 0.75, duration: 0.4 },   // D5
        { freq: 659, time: 1.1, duration: 0.5 },    // E5
        { freq: 784, time: 1.6, duration: 0.6 },    // G5 (climax)
      ];

      notes.forEach(note => {
        const startTime = now + note.time;
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();

        osc.type = 'sine'; // Warm, energetic tone
        osc.frequency.value = note.freq;

        osc.connect(gain);
        gain.connect(audioContext.destination);

        gain.gain.setValueAtTime(0, startTime);
        gain.gain.linearRampToValueAtTime(0.3, startTime + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.05, startTime + note.duration);

        osc.start(startTime);
        osc.stop(startTime + note.duration);
      });
    };

    // Energetic bass pulse
    const playEnergeticBass = () => {
      const pulses = [
        { freq: 110, time: 0 },   // A2
        { freq: 147, time: 0.8 }, // D3
        { freq: 110, time: 1.6 }, // A2
        { freq: 165, time: 2.2 }, // E3
      ];

      pulses.forEach(pulse => {
        const startTime = now + pulse.time;
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();

        osc.type = 'sine';
        osc.frequency.value = pulse.freq;

        osc.connect(gain);
        gain.connect(audioContext.destination);

        gain.gain.setValueAtTime(0.2, startTime);
        gain.gain.exponentialRampToValueAtTime(0.05, startTime + 0.7);

        osc.start(startTime);
        osc.stop(startTime + 0.7);
      });
    };

    // Exciting hi-hat style clicks
    const playExcitingClicks = () => {
      const clicks = [
        { time: 0.2 },
        { time: 0.6 },
        { time: 1.0 },
        { time: 1.4 },
        { time: 1.8 },
        { time: 2.2 },
      ];

      clicks.forEach(click => {
        const startTime = now + click.time;
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();

        osc.type = 'square';
        osc.frequency.value = 200; // Click pitch
        osc.frequency.exponentialRampToValueAtTime(50, startTime + 0.1);

        osc.connect(gain);
        gain.connect(audioContext.destination);

        gain.gain.setValueAtTime(0.15, startTime);
        gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.1);

        osc.start(startTime);
        osc.stop(startTime + 0.1);
      });
    };

    // Quick rising tension sweep
    const playTensionSweep = () => {
      const startTime = now + 0.5;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();

      osc.type = 'sine';
      osc.frequency.setValueAtTime(300, startTime);
      osc.frequency.exponentialRampToValueAtTime(800, startTime + 2);

      osc.connect(gain);
      gain.connect(audioContext.destination);

      gain.gain.setValueAtTime(0.1, startTime);
      gain.gain.setValueAtTime(0.15, startTime + 1.5);
      gain.gain.exponentialRampToValueAtTime(0.02, startTime + 2);

      osc.start(startTime);
      osc.stop(startTime + 2);
    };

    // Play all exciting layers
    playExcitingStrings();
    playEnergeticBass();
    playExcitingClicks();
    playTensionSweep();
  }

  // Render names list
  function renderNamesList() {
    document.getElementById('count').textContent = participants.length;
    const container = document.getElementById('names-list');
    const shouldTruncate = participants.length > previewNamesCount;
    const visibleNames = showAllNames || !shouldTruncate
      ? participants
      : participants.slice(0, previewNamesCount);

    container.innerHTML = visibleNames.map(n =>
      `<span class="px-3 py-1 rounded-full text-xs font-bold" style="background: rgba(201,160,255,0.15); color: #c9a0ff; font-family: 'Noto Sans TC', sans-serif;">${n}</span>`
    ).join('');

    const toggleWrapper = document.getElementById('names-toggle-wrapper');
    const toggleBtn = document.getElementById('names-toggle-btn');
    const hiddenCountText = document.getElementById('names-hidden-count');

    if (shouldTruncate) {
      const hiddenCount = participants.length - previewNamesCount;
      toggleWrapper.classList.remove('hidden');
      toggleBtn.textContent = showAllNames ? '收起名單' : '顯示全部';
      hiddenCountText.textContent = showAllNames ? '' : `仲有 ${hiddenCount} 位未顯示`;
    } else {
      toggleWrapper.classList.add('hidden');
      hiddenCountText.textContent = '';
    }
  }

  function toggleNamesList() {
    showAllNames = !showAllNames;
    renderNamesList();
  }

  // Create sparkles
  function createSparkles() {
    const container = document.getElementById('sparkles-container');
    for (let i = 0; i < 10; i++) {
      const s = document.createElement('div');
      s.className = 'sparkle';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = (5 + Math.random() * 35) + '%';
      s.style.transform = `scale(${0.55 + Math.random() * 0.9})`;
      s.style.animationDelay = Math.random() * 5 + 's';
      s.style.animationDuration = (8 + Math.random() * 5) + 's';
      container.appendChild(s);
    }
  }

  // Confetti explosion
  function launchConfetti() {
    const container = document.getElementById('confetti-container');
    container.innerHTML = '';
    const colors = ['#ffd700', '#ff6b6b', '#4ecdc4', '#a855f7', '#ff69b4', '#00ff88'];
    for (let i = 0; i < 80; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + '%';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.animationDuration = (2 + Math.random() * 2) + 's';
      piece.style.animationDelay = Math.random() * 0.5 + 's';
      piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      container.appendChild(piece);
    }
    setTimeout(() => container.innerHTML = '', 4000);
  }

  // Start draw
  function startDraw() {
    if (isDrawing) return;
    
    // 如果冇人未抽, 重新開始
    if (participants.length === 0) {
      participants = [...allParticipants];
      winners = [];
      showAllNames = false;
      renderNamesList();
    }

    isDrawing = true;

    const btn = document.getElementById('draw-btn');
    btn.style.opacity = '0.5';
    btn.style.pointerEvents = 'none';

    const display = document.getElementById('display-name');
    const winnerDisplay = document.getElementById('winner-display');
    winnerDisplay.classList.add('hidden');

    // Play dramatic music
    playDramaticMusic(3000);

    let speed = 50;
    let elapsed = 0;
    const totalDuration = 3000;
    let idx = 0;

    function cycle() {
      idx = (idx + 1) % participants.length;
      display.textContent = participants[idx];
      elapsed += speed;

      // Play spinning beep
      playSpinningBeep(400 + Math.random() * 400);

      if (elapsed < totalDuration) {
        speed = 50 + (elapsed / totalDuration) * 200;
        animationId = setTimeout(cycle, speed);
      } else {
        // 從剩餘名單中隨機抽一個
        const winnerIdx = Math.floor(Math.random() * participants.length);
        const winner = participants[winnerIdx];
        
        // 將中獎者移到 winners 陣列, 從 participants 移除
        participants.splice(winnerIdx, 1);
        winners.push(winner);
        
        display.textContent = winner;
        display.style.color = '#ffd700';

        // Play winning sound
        playWinningSound();

        winnerDisplay.classList.remove('hidden');
        winnerDisplay.style.animation = 'winner-reveal 0.6s ease-out forwards';
        document.getElementById('winner-name').textContent = winner;

        launchConfetti();
        
        // 更新名單顯示
        showAllNames = false;
        renderNamesList();

        setTimeout(() => {
          isDrawing = false;
          btn.style.opacity = '1';
          btn.style.pointerEvents = 'auto';
          display.style.color = '#ffffff';
        }, 2000);
      }
    }
    cycle();
  }

  // Auto fullscreen on load (requires user gesture; fallback: click anywhere)
  function requestFullscreen() {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
    else if (el.msRequestFullscreen) el.msRequestFullscreen();
  }
  // Try immediately; if blocked, trigger on first click/keydown
  try { requestFullscreen(); } catch(e) {}
  document.addEventListener('click', function onFirstInteraction() {
    requestFullscreen();
    document.removeEventListener('click', onFirstInteraction);
  }, { once: true });

  // Presenter remote: next page (ArrowRight / PageDown / Space) triggers startDraw
  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') {
      e.preventDefault();
      startDraw();
    }
  });

  // Init
  renderNamesList();
  createSparkles();
