<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barcode & 手動輸入收集器 v0.13</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: #f5f5f7;
            color: #333;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 { 
            text-align: center; 
            margin-top: 0; 
            color: #1d1d1f;
        }
        
        .scanner-wrapper {
            position: relative;
            width: 100%;
            height: 250px;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
            background: #000;
        }
        #reader {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #reader video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }

        .scan-laser {
            position: absolute;
            top: 50%;
            left: 5%;
            width: 90%;
            height: 2px;
            background-color: #34c759;
            box-shadow: 0 0 8px #34c759;
            transform: translateY(-50%);
            z-index: 10;
            pointer-events: none;
            animation: lasermove 2s infinite ease-in-out;
        }
        .scan-guide-box {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80%;
            height: 100px;
            border: 2px dashed #34c759;
            transform: translate(-50%, -50%);
            z-index: 9;
            pointer-events: none;
            border-radius: 6px;
        }
        @keyframes lasermove {
            0% { top: 30%; }
            50% { top: 70%; }
            100% { top: 30%; }
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            -webkit-appearance: none;
        }
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        button:active {
            opacity: 0.8;
        }
        .btn-primary { background-color: #007aff; color: white; }
        .btn-success { background-color: #34c759; color: white; width: 100%; margin-top: 10px; }
        .btn-danger { background-color: #ff3b30; color: white; }
        .btn-warn { background-color: #ff9500; color: white; width: 100%; margin-top: 10px; }
        .btn-camera { background-color: #5856d6; color: white; width: 100%; margin-top: 10px; }
        
        .list-container {
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px 8px;
            text-align: left;
            font-size: 14px;
        }
        th { background-color: #f2f2f2; }
        .no-data {
            text-align: center;
            color: #999;
            padding: 20px 0;
        }
        .error-message {
            color: red;
            font-size: 12px;
            text-align: center;
            margin-top: 5px;
            min-height: 16px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>條碼掃描 & 數據收集 v0.13</h2>
    
    <div class="scanner-wrapper">
        <div id="reader"></div>
        <div class="scan-guide-box"></div>
        <div class="scan-laser"></div>
    </div>
    <div id="errorLog" class="error-message"></div>
    
    <button class="btn-warn" id="testAudioBtn" onclick="testAudio()">🔊 點擊此處激活/測試「嗶」聲</button>
    <button class="btn-camera" onclick="restartCamera()">📷 重新啟動相機</button>
    <div style="margin-bottom: 15px;"></div>

    <div class="input-group">
        <input type="text" id="manualInput" placeholder="手動輸入號碼 / 條碼" autocomplete="off">
        <button class="btn-primary" onclick="addManualData()">加入</button>
    </div>

    <button class="btn-success" onclick="exportToCSV()">匯出 CSV (Excel)</button>
    <button class="btn-danger" style="width: 100%; margin-top: 10px; background-color: #8e8e93;" onclick="clearData()">清除所有數據</button>

    <div class="list-container">
        <h3>已收集數據 (共 <span id="count">0</span> 條)</h3>
        <div style="max-height: 250px; overflow-y: auto;">
            <table>
                <thead>
                    <tr>
                        <th style="width: 45%;">時間</th>
                        <th style="width: 55%;">條碼數值</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let collectedData = JSON.parse(localStorage.getItem('scanned_data')) || [];
    let audioCtx = null;
    let html5QrCode = null;
    let isStarting = false;

    function setError(msg) {
        document.getElementById('errorLog').innerText = msg || '';
    }

    function initAudio() {
        if (!audioCtx) {
            const AC = window.AudioContext || window.webkitAudioContext;
            if (!AC) return;
            audioCtx = new AC();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume().catch(() => {});
        }
    }

    document.body.addEventListener('click', initAudio, { passive: true });
    document.body.addEventListener('touchstart', initAudio, { passive: true });

    function playBeep() {
        initAudio();
        if (!audioCtx) return;
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = 'sine';
            osc.frequency.setValueAtTime(1200, audioCtx.currentTime); 
            gain.gain.setValueAtTime(0.25, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08); 

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.08);
        } catch (e) {
            console.error("Audio playback failed: ", e);
        }
    }

    function testAudio() {
        initAudio();
        playBeep();
        const btn = document.getElementById('testAudioBtn');
        btn.innerText = "✅ 聲音已解鎖（若仍無聲請檢查手機側邊靜音掣）";
        btn.style.backgroundColor = "#34c759";
    }

    function updateUI() {
        localStorage.setItem('scanned_data', JSON.stringify(collectedData));
        document.getElementById('count').innerText = collectedData.length;
        const tbody = document.getElementById('dataTableBody');
        tbody.innerHTML = '';
        
        if (collectedData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="2" class="no-data">暫無數據，請開始掃描或輸入</td></tr>`;
            return;
        }

        [...collectedData].reverse().forEach(item => {
            const row = `<tr><td>${item.time}</td><td>${item.value}</td></tr>`;
            tbody.innerHTML += row;
        });
    }

    function addRecord(value) {
        if (!value || !value.trim()) return;
        
        const now = new Date();
        const timeStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
        
        collectedData.push({ time: timeStr, value: value.trim() });
        updateUI();
        playBeep();
        if (navigator.vibrate) navigator.vibrate(100);
    }

    function addManualData() {
        const input = document.getElementById('manualInput');
        addRecord(input.value);
        input.value = '';
        input.focus();
    }

    document.getElementById('manualInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') addManualData();
    });

    function clearData() {
        if (confirm('確定要永久刪除所有已記錄的數據嗎？')) {
            collectedData = [];
            updateUI();
        }
    }

    function exportToCSV() {
        if (collectedData.length === 0) {
            alert('沒有數據可以匯出！');
            return;
        }
        
        let csvContent = "\uFEFF"; 
        csvContent += "時間,條碼數值\n";
        
        collectedData.forEach(item => {
            const safeValue = `"${item.value.replace(/"/g, '""')}"`;
            csvContent += `${item.time},${safeValue}\n`;
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `barcode_export_${Date.now()}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    function onScanSuccess(decodedText) {
        if (window.lastScan && Date.now() - window.lastScan < 1200) return;
        window.lastScan = Date.now();
        addRecord(decodedText);
    }

    function onScanFailure() {}

    async function startCamera() {
        if (isStarting) return;
        isStarting = true;
        setError('');

        try {
            if (!window.isSecureContext) {
                setError("需要 HTTPS 才可啟動相機。");
                return;
            }

            if (html5QrCode) {
                try { await html5QrCode.stop(); } catch(e) {}
                try { await html5QrCode.clear(); } catch(e) {}
            }

            html5QrCode = new Html5Qrcode("reader");
            const config = { 
                fps: 12,
                qrbox: { width: 280, height: 120 },
                formatsToSupport: [ 
                    Html5QrcodeSupportedFormats.CODE_128,
                    Html5QrcodeSupportedFormats.EAN_13,
                    Html5QrcodeSupportedFormats.EAN_8,
                    Html5QrcodeSupportedFormats.CODE_39,
                    Html5QrcodeSupportedFormats.UPC_A,
                    Html5QrcodeSupportedFormats.QR_CODE
                ]
            };

            // 先試後鏡頭
            try {
                await html5QrCode.start({ facingMode: { exact: "environment" } }, config, onScanSuccess, onScanFailure);
            } catch (e1) {
                // fallback：普通 environment
                try {
                    await html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess, onScanFailure);
                } catch (e2) {
                    // fallback：第一個可用鏡頭
                    const cams = await Html5Qrcode.getCameras();
                    if (!cams || cams.length === 0) throw e2;
                    await html5QrCode.start(cams[0].id, config, onScanSuccess, onScanFailure);
                }
            }

            // iOS Safari 補強
            const video = document.querySelector('#reader video');
            if (video) {
                video.setAttribute('playsinline', true);
                video.setAttribute('webkit-playsinline', true);
                video.muted = true;
            }

        } catch (err) {
            console.error("Camera start failed:", err);
            setError("啟動鏡頭失敗，請允許相機權限後按「重新啟動相機」。");
        } finally {
            isStarting = false;
        }
    }

    function restartCamera() {
        startCamera();
    }

    window.addEventListener('DOMContentLoaded', () => {
        updateUI();
        startCamera();
    });
</script>

</body>
</html>
