<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barcode & 手動輸入收集器 v0.12</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: #f5f5f7;
            color: #333;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 { 
            text-align: center; 
            margin-top: 0; 
            color: #1d1d1f;
        }
        
        /* 鏡頭外殼容器 */
        .scanner-wrapper {
            position: relative;
            width: 100%;
            height: 250px;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
            background: #000;
        }
        #reader {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #reader video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }

        /* 自定義 CSS 掃描線/框 */
        .scan-laser {
            position: absolute;
            top: 50%;
            left: 5%;
            width: 90%;
            height: 2px;
            background-color: #34c759;
            box-shadow: 0 0 8px #34c759;
            transform: translateY(-50%);
            z-index: 10;
            pointer-events: none;
            animation: lasermove 2s infinite ease-in-out;
        }
        .scan-guide-box {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80%;
            height: 100px;
            border: 2px dashed #34c759;
            transform: translate(-50%, -50%);
            z-index: 9;
            pointer-events: none;
            border-radius: 6px;
        }
        @keyframes lasermove {
            0% { top: 30%; }
            50% { top: 70%; }
            100% { top: 30%; }
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            -webkit-appearance: none;
        }
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        button:active {
            opacity: 0.8;
        }
        .btn-primary { background-color: #007aff; color: white; }
        .btn-success { background-color: #34c759; color: white; width: 100%; margin-top: 10px; }
        .btn-danger { background-color: #ff3b30; color: white; }
        .btn-warn { background-color: #ff9500; color: white; width: 100%; margin-top: 10px; }
        
        .list-container {
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px 8px;
            text-align: left;
            font-size: 14px;
        }
        th { background-color: #f2f2f2; }
        .no-data {
            text-align: center;
            color: #999;
            padding: 20px 0;
        }
        .error-message {
            color: red;
            font-size: 12px;
            text-align: center;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>條碼掃描 & 數據收集 v0.12</h2>
    
    <div class="scanner-wrapper">
        <div id="reader"></div>
        <div class="scan-guide-box"></div>
        <div class="scan-laser"></div>
    </div>
    <div id="errorLog" class="error-message"></div>
    
    <button class="btn-warn" id="testAudioBtn" onclick="testAudio()">🔊 點擊此處激活/測試「嗶」聲</button>
    <div style="margin-bottom: 15px;"></div>

    <div class="input-group">
        <input type="text" id="manualInput" placeholder="手動輸入號碼 / 條碼" autocomplete="off">
        <button class="btn-primary" onclick="addManualData()">加入</button>
    </div>

    <button class="btn-success" onclick="exportToCSV()">匯出 CSV (Excel)</button>
    <button class="btn-danger" style="width: 100%; margin-top: 10px; background-color: #8e8e93;" onclick="clearData()">清除所有數據</button>

    <div class="list-container">
        <h3>已收集數據 (共 <span id="count">0</span> 條)</h3>
        <div style="max-height: 250px; overflow-y: auto;">
            <table>
                <thead>
                    <tr>
                        <th style="width: 45%;">時間</th>
                        <th style="width: 55%;">條碼數值</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let collectedData = JSON.parse(localStorage.getItem('scanned_data')) || [];
    let audioCtx = null;
    let html5QrCode = null;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    document.body.addEventListener('click', initAudio, { once: false });
    document.body.addEventListener('touchstart', initAudio, { once: false });

    function playBeep() {
        initAudio();
        try {
            const buffer = audioCtx.createBuffer(1, 1, 22050);
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(audioCtx.destination);
            source.start(0);

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = 'sine';
            osc.frequency.setValueAtTime(1200, audioCtx.currentTime); 
            
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08); 

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.08);
        } catch (e) {
            console.error("Audio playback failed: ", e);
        }
    }

    function testAudio() {
        initAudio();
        playBeep();
        const btn = document.getElementById('testAudioBtn');
        btn.innerText = "✅ 聲音已解鎖（若仍無聲請檢查手機側邊靜音掣）";
        btn.style.backgroundColor = "#34c759";
    }

    function updateUI() {
        localStorage.setItem('scanned_data', JSON.stringify(collectedData));
        document.getElementById('count').innerText = collectedData.length;
        const tbody = document.getElementById('dataTableBody');
        tbody.innerHTML = '';
        
        if (collectedData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="2" class="no-data">暫無數據，請開始掃描或輸入</td></tr>`;
            return;
        }

        [...collectedData].reverse().forEach(item => {
            const row = `<tr><td>${item.time}</td><td>${item.value}</td></tr>`;
            tbody.innerHTML += row;
        });
    }

    function addRecord(value) {
        if (!value.trim()) return;
        
        const now = new Date();
        const timeStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
        
        collectedData.push({ time: timeStr, value: value.trim() });
        updateUI();
        
        playBeep();
        
        if (navigator.vibrate) navigator.vibrate(100);
    }

    function addManualData() {
        const input = document.getElementById('manualInput');
        addRecord(input.value);
        input.value = '';
        input.focus();
    }

    document.getElementById('manualInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            addManualData();
        }
    });

    function clearData() {
        if (confirm('確定要永久刪除所有已記錄的數據嗎？')) {
            collectedData = [];
            updateUI();
        }
    }

    function exportToCSV() {
        if (collectedData.length === 0) {
            alert('沒有數據可以匯出！');
            return;
        }
        
        let csvContent = "\uFEFF"; 
        csvContent += "時間,條碼數值\n";
        
        collectedData.forEach(item => {
            const safeValue = `"${item.value.replace(/"/g, '""')}"`;
            csvContent += `${item.time},${safeValue}\n`;
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `barcode_export_${Date.now()}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function onScanSuccess(decodedText, decodedResult) {
        if (window.lastScan && Date.now() - window.lastScan < 1500) return;
        window.lastScan = Date.now();
        addRecord(decodedText);
    }

    // --- 核心重構：使用純 API 直接叫醒相機，避開 iOS UI 卡死 Bug ---
    function startCamera() {
        // 實例化純 API 類別（#reader 容器）
        html5QrCode = new Html5QrCode("reader");
        
        const config = { 
            fps: 15,
            // 限制支援常見 1D 條碼
            formatsToSupport: [ 
                Html5QrcodeSupportedFormats.CODE_128,
                Html5QrcodeSupportedFormats.EAN_13,
                Html5QrcodeSupportedFormats.EAN_8,
                Html5QrcodeSupportedFormats.CODE_39,
                Html5QrcodeSupportedFormats.UPC_A
            ]
        };

        // 直接調用後置鏡頭啟動，跳過權限 UI 選擇
        html5QrCode.start(
            { facingMode: "environment" }, 
            config, 
            onScanSuccess
        ).catch(err => {
            document.getElementById('errorLog').innerText = "啟動鏡頭失敗: " + err;
            console.error("Camera start failed: ", err);
        });
    }

    // 頁面載入完成後自動執行
    window.addEventListener('DOMContentLoaded', () => {
        updateUI();
        startCamera();
    });
</script>

</body>
</html>
