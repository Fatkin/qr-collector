<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode & 手動輸入收集器</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: #f5f5f7;
            color: #333;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 { 
            text-align: center; 
            margin-top: 0; 
            color: #1d1d1f;
        }
        #reader {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
            border: none !important;
        }
        #reader button {
            background-color: #007aff;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: bold;
            margin: 10px 0;
            cursor: pointer;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            -webkit-appearance: none;
        }
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        button:active {
            opacity: 0.8;
        }
        .btn-primary { background-color: #007aff; color: white; }
        .btn-success { background-color: #34c759; color: white; width: 100%; margin-top: 10px; }
        .btn-danger { background-color: #ff3b30; color: white; }
        
        .list-container {
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px 8px;
            text-align: left;
            font-size: 14px;
        }
        th { background-color: #f2f2f2; }
        .no-data {
            text-align: center;
            color: #999;
            padding: 20px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>條碼掃描 & 數據收集</h2>
    
    <div id="reader"></div>
    
    <div class="input-group">
        <input type="text" id="manualInput" placeholder="手動輸入號碼 / 條碼" autocomplete="off">
        <button class="btn-primary" onclick="addManualData()">加入</button>
    </div>

    <button class="btn-success" onclick="exportToCSV()">匯出 CSV (Excel)</button>
    <button class="btn-danger" style="width: 100%; margin-top: 10px; background-color: #8e8e93;" onclick="clearData()">清除所有數據</button>

    <div class="list-container">
        <h3>已收集數據 (共 <span id="count">0</span> 條)</h3>
        <div style="max-height: 250px; overflow-y: auto;">
            <table>
                <thead>
                    <tr>
                        <th style="width: 45%;">時間</th>
                        <th style="width: 55%;">條碼數值</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let collectedData = JSON.parse(localStorage.getItem('scanned_data')) || [];

    function updateUI() {
        localStorage.setItem('scanned_data', JSON.stringify(collectedData));
        document.getElementById('count').innerText = collectedData.length;
        const tbody = document.getElementById('dataTableBody');
        tbody.innerHTML = '';
        
        if (collectedData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="2" class="no-data">暫無數據，請開始掃描或輸入</td></tr>`;
            return;
        }

        [...collectedData].reverse().forEach(item => {
            const row = `<tr><td>${item.time}</td><td>${item.value}</td></tr>`;
            tbody.innerHTML += row;
        });
    }

    function addRecord(value) {
        if (!value.trim()) return;
        
        const now = new Date();
        const timeStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}::${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
        
        collectedData.push({ time: timeStr, value: value.trim() });
        updateUI();
        
        if (navigator.vibrate) navigator.vibrate(100);
    }

    function addManualData() {
        const input = document.getElementById('manualInput');
        addRecord(input.value);
        input.value = '';
        input.focus();
    }

    document.getElementById('manualInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            addManualData();
        }
    });

    function clearData() {
        if (confirm('確定要永久刪除所有已記錄的數據嗎？')) {
            collectedData = [];
            updateUI();
        }
    }

    function exportToCSV() {
        if (collectedData.length === 0) {
            alert('沒有數據可以匯出！');
            return;
        }
        
        let csvContent = "\uFEFF"; 
        csvContent += "時間,條碼數值\n";
        
        collectedData.forEach(item => {
            const safeValue = `"${item.value.replace(/"/g, '""')}"`;
            csvContent += `${item.time},${safeValue}\n`;
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `barcode_export_${Date.now()}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function onScanSuccess(decodedText, decodedResult) {
        if (window.lastScan && Date.now() - window.lastScan < 1500) return;
        window.lastScan = Date.now();
        addRecord(decodedText);
    }

    // --- 關鍵修正：啟動條碼掃描器 ---
    const html5QrcodeScanner = new Html5QrcodeScanner(
        "reader", 
        { 
            fps: 15,
            // 修正為 iOS 支援的固定寬高 Object，不再使用 Function，避免崩潰
            qrbox: { width: 300, height: 120 }, 
            rememberLastUsedCamera: true,
            // 強制設定鏡頭調用參數，防止在 iOS Firefox/Safari 上選擇了錯誤的鏡頭
            videoConstraints: {
                facingMode: "environment"
            }
        }
    );
    html5QrcodeScanner.render(onScanSuccess);

    updateUI();
</script>

</body>
</html>
